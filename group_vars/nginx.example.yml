---
# Copy to homepage-webserver-ansible/group_vars/nginx.yml before running nginx.yml

# TLS is enabled automatically once a certificate exists (single playbook run,
# webroot challenge). Set false to skip certbot entirely (e.g. local/dev).
nginx_manage_certs: true

nginx_domains:
  - www.example.com
  - example.com
nginx_cert_email: you@example.com
nginx_listen_ipv6: false

nginx_apps:
  - name: homepage-bulma
    main: true
    repo: https://github.com/Aapok0/homepage-bulma.git
    version: main # Pin a tag (e.g. v2.0.0) or commit for reproducible deploys
    location: "" # Empty = served from site root; set a subpath (e.g. v2) to nest it
    npm: true
    sass: true
    php: true
    build_command: css-build
