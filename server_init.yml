---
- name: Server init
  hosts: servers

  roles:
    - server_init

# Tailscale must be up before the firewall restricts SSH to the tailscale0
# interface, otherwise you would lock yourself out.
- name: Tailscale
  hosts: servers
  become: true

  roles:
    - tailscale

- name: Firewall
  hosts: servers
  become: true

  roles:
    - firewall
