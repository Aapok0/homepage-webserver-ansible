---
- name: Create Nginx user
  ansible.builtin.user:
    name: '{{ nginx_user }}'
    system: true
    home: /nonexistent
    shell: /usr/sbin/nologin

- name: Install Nginx and other dependencies
  ansible.builtin.include_tasks: install.yml

# /etc/nginx is absent until the package is really installed (not in --check);
# gate the template/service tasks below on it so they still preview when present.
- name: Detect whether Nginx is installed
  ansible.builtin.stat:
    path: /etc/nginx
  register: nginx_etc

- name: Set nginx_present fact
  ansible.builtin.set_fact:
    nginx_present: '{{ nginx_etc.stat.exists }}'

- name: Deploy app to server
  ansible.builtin.include_tasks: app.yml

- name: Detect existing TLS certificate
  ansible.builtin.stat:
    path: '/etc/letsencrypt/live/{{ nginx_domains | first }}/fullchain.pem'
  register: nginx_tls_cert
  when: nginx_domains is defined

- name: Set TLS state
  ansible.builtin.set_fact:
    nginx_tls_enabled: "{{ (nginx_domains is defined) and (nginx_tls_cert.stat.exists | default(false)) }}"

- name: Add vhost file and enable app
  ansible.builtin.include_tasks: vhost.yml

- name: Generate certificate and setup automatic renewal
  ansible.builtin.include_tasks: certbot.yml

- name: Backup default configuration file
  ansible.builtin.command:
    cmd: cp -p /etc/nginx/nginx.conf /etc/nginx/nginx.conf.bak
    creates: /etc/nginx/nginx.conf.bak

- name: Add managed configuration file
  ansible.builtin.template:
    src: templates/nginx.conf.v2
    dest: /etc/nginx/nginx.conf
    force: true
    owner: nginx
    group: nginx
    mode: '0644'
  when: nginx_present

- name: Validate Nginx configuration
  ansible.builtin.command:
    cmd: nginx -t
  changed_when: false
  when: nginx_present

- name: Ensure nginx service is running as configured
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
  when: nginx_present
