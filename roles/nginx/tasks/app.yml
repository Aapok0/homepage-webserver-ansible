---
- name: Make sure app git directories are present
  ansible.builtin.file:
    path: /opt/{{ item.name }}
    state: directory
    mode: '0755'
  loop: '{{ nginx_apps }}'
  loop_control:
    label: '{{ item.name }}'

- name: Make sure app nginx directories are present
  ansible.builtin.file:
    path: /var/www/{{ nginx_domains | first | default('app') }}/{{ item.location }}
    state: directory
    owner: nginx
    group: nginx
    mode: '0755'
  loop: '{{ nginx_apps }}'
  loop_control:
    label: '{{ item.name }}'

- name: Clone app at pinned ref
  ansible.builtin.git:
    repo: '{{ item.repo }}'
    dest: /opt/{{ item.name }}
    version: "{{ item.version | default('main') }}"
    force: true
  register: nginx_repository
  loop: '{{ nginx_apps }}'
  loop_control:
    label: "{{ item.name }}@{{ item.version | default('main') }}"

# Downstream tasks loop over the clone results so each app's change state is
# tracked individually (item.item = the app, item.changed = that app changed).
# Skip node_modules/.git: chmod 0644 would strip the execute bit off installed
# binaries (e.g. node_modules/.bin/sass), breaking the build on re-deploys where
# node_modules already exists before this runs.
- name: Ensure app directories have 755 permissions
  ansible.builtin.command:
    cmd: find /opt/{{ item.item.name }} \( -path '*/node_modules' -o -path '*/.git' \) -prune -o -type d -exec chmod 0755 {} +
  loop: '{{ nginx_repository.results }}'
  loop_control:
    label: '{{ item.item.name }}'
  changed_when: item.changed

- name: Ensure app files have 644 permissions
  ansible.builtin.command:
    cmd: find /opt/{{ item.item.name }} \( -path '*/node_modules' -o -path '*/.git' \) -prune -o -type f -exec chmod 0644 {} +
  loop: '{{ nginx_repository.results }}'
  loop_control:
    label: '{{ item.item.name }}'
  changed_when: item.changed

# State checks let install/build self-heal: if a previous run failed after the
# clone (which won't report changed again), missing node_modules / build output
# still trigger a redo instead of silently shipping a half-built app.
- name: Check whether node_modules is present
  ansible.builtin.stat:
    path: /opt/{{ item.item.name }}/node_modules
  loop: '{{ nginx_repository.results }}'
  loop_control:
    label: '{{ item.item.name }}'
  register: nginx_node_modules

- name: Check whether built CSS is present
  ansible.builtin.stat:
    path: /opt/{{ item.item.name }}/css/main.css
  loop: '{{ nginx_repository.results }}'
  loop_control:
    label: '{{ item.item.name }}'
  register: nginx_build_output

# --ignore-scripts: don't run dependency build scripts (not needed for a CSS build)
# and don't fail on ERR_PNPM_IGNORED_BUILDS; keeps node_modules consistent so the
# build below doesn't trigger a re-install.
# Skipped in --check: no real clone there, so /opt/<app> is absent.
- name: Install app dependencies
  ansible.builtin.command:
    cmd: pnpm install --ignore-scripts
    chdir: /opt/{{ item.item.name }}
  loop: '{{ nginx_repository.results }}'
  loop_control:
    label: '{{ item.item.name }}'
    index_var: idx
  when:
    - item.item.npm | default(false)
    - not ansible_check_mode
    - item.changed or not nginx_node_modules.results[idx].stat.exists
  changed_when: true

- name: Build app
  ansible.builtin.command:
    cmd: pnpm run {{ item.item.build_command }}
    chdir: /opt/{{ item.item.name }}
  loop: '{{ nginx_repository.results }}'
  loop_control:
    label: '{{ item.item.name }}'
    index_var: idx
  when:
    - item.item.sass | default(false)
    - not ansible_check_mode
    - item.changed or not nginx_build_output.results[idx].stat.exists
  changed_when: true

- name: Copy app files to the app nginx directory
  ansible.posix.synchronize:
    src: /opt/{{ item.item.name }}/
    dest: /var/www/{{ nginx_domains | first | default('app') }}/{{ item.item.location }}/
    perms: true
    rsync_opts: >-
      {{ (['--delete'] if (item.item.location | default('') | regex_replace('^/+', '') | regex_replace('/+$', '')) != ''
            or nginx_apps | length == 1
          else [])
         + ['--exclude=node_modules', '--exclude=.git'] }}
  delegate_to: '{{ inventory_hostname }}'
  notify: Restart Nginx
  loop: '{{ nginx_repository.results }}'
  loop_control:
    label: '{{ item.item.name }}'
  when: not ansible_check_mode

# Check-capable: skip when the web root doesn't exist yet (fresh host in --check).
- name: Stat app web root
  ansible.builtin.stat:
    path: /var/www/{{ nginx_domains | first | default('app') }}
  register: nginx_web_root

- name: Change ownership of app nginx directories
  ansible.builtin.file:
    path: /var/www/{{ nginx_domains | first | default('app') }}
    owner: nginx
    group: nginx
    recurse: true
  when: nginx_web_root.stat.exists
