---
- name: Make sure app git directories are present
  ansible.builtin.file:
    path: /opt/{{ item.name }}
    state: directory
    mode: '0755'
  loop: '{{ nginx_apps }}'
  loop_control:
    label: '{{ item.name }}'

- name: Make sure app nginx directories are present
  ansible.builtin.file:
    path: /var/www/{{ nginx_domains | first | default('app') }}/{{ item.location }}
    state: directory
    owner: nginx
    group: nginx
    mode: '0755'
  loop: '{{ nginx_apps }}'
  loop_control:
    label: '{{ item.name }}'

- name: Clone app at pinned ref
  ansible.builtin.git:
    repo: '{{ item.repo }}'
    dest: /opt/{{ item.name }}
    version: "{{ item.version | default('main') }}"
    force: true
  register: nginx_repository
  loop: '{{ nginx_apps }}'
  loop_control:
    label: "{{ item.name }}@{{ item.version | default('main') }}"

# Downstream tasks loop over the clone results so each app's change state is
# tracked individually (item.item = the app, item.changed = that app changed).
- name: Ensure app directories have 755 permissions
  ansible.builtin.command:
    cmd: find /opt/{{ item.item.name }} -type d -exec chmod 0755 {} \;
  loop: '{{ nginx_repository.results }}'
  loop_control:
    label: '{{ item.item.name }}'
  changed_when: item.changed

- name: Ensure app files have 644 permissions
  ansible.builtin.command:
    cmd: find /opt/{{ item.item.name }} -type f -exec chmod 0644 {} \;
  loop: '{{ nginx_repository.results }}'
  loop_control:
    label: '{{ item.item.name }}'
  changed_when: item.changed

# No real clone in --check, so /opt/<app> is absent; skip these in check mode.
# --ignore-scripts: don't run dependency build scripts (not needed for a CSS build)
# and don't fail on ERR_PNPM_IGNORED_BUILDS; keeps node_modules consistent so the
# build below doesn't trigger a re-install.
- name: Install app dependencies
  ansible.builtin.command:
    cmd: pnpm install --ignore-scripts
    chdir: /opt/{{ item.item.name }}
  loop: '{{ nginx_repository.results }}'
  loop_control:
    label: '{{ item.item.name }}'
  when: item.item.npm | default(false) and item.changed and not ansible_check_mode
  changed_when: item.changed

- name: Build app
  ansible.builtin.command:
    cmd: pnpm run {{ item.item.build_command }}
    chdir: /opt/{{ item.item.name }}
  loop: '{{ nginx_repository.results }}'
  loop_control:
    label: '{{ item.item.name }}'
  when: item.item.sass | default(false) and item.changed and not ansible_check_mode
  changed_when: item.changed

- name: Copy app files to the app nginx directory
  ansible.posix.synchronize:
    src: /opt/{{ item.item.name }}/
    dest: /var/www/{{ nginx_domains | first | default('app') }}/{{ item.item.location }}/
    perms: true
  delegate_to: '{{ inventory_hostname }}'
  notify: Restart Nginx
  loop: '{{ nginx_repository.results }}'
  loop_control:
    label: '{{ item.item.name }}'
  when: not ansible_check_mode

# Check-capable: skip when the web root doesn't exist yet (fresh host in --check).
- name: Stat app web root
  ansible.builtin.stat:
    path: /var/www/{{ nginx_domains | first | default('app') }}
  register: nginx_web_root

- name: Change ownership of app nginx directories
  ansible.builtin.file:
    path: /var/www/{{ nginx_domains | first | default('app') }}
    owner: nginx
    group: nginx
    recurse: true
  when: nginx_web_root.stat.exists
