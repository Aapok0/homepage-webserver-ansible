---
# - name: Add PPA for Nginx and update cache
#  apt_repository:
#    repo: ppa:nginx/stable
#    state: present
#    update_cache: true

- name: Update apt repository and cache
  ansible.builtin.apt:
    update_cache: true

- name: Make sure dependencies required for adding nodejs repo are installed
  ansible.builtin.apt:
    name: '{{ item }}'
  with_items:
    - ca-certificates
    - curl
    - gnupg

- name: Install the nodejs repository
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash -
    creates: /etc/apt/preferences.d/nodejs
    executable: /bin/bash

- name: Install Nginx and required other packages
  ansible.builtin.apt:
    name: '{{ item }}'
  with_items:
    - nginx
    - git
    - php
    - '{{ nginx_php_fpm_package }}'
    - nodejs
    - certbot
    - python3-certbot-nginx

# Need the packages really installed (not the case in --check).
- name: Enable and start PHP-FPM
  ansible.builtin.service:
    name: '{{ nginx_php_fpm_package }}'
    state: started
    enabled: true
  when: not ansible_check_mode

- name: Install pnpm
  ansible.builtin.command:
    cmd: npm install -g pnpm
    creates: /usr/bin/pnpm
  when: not ansible_check_mode

# Check-capable: skip paths that don't exist yet (e.g. fresh host in --check).
- name: Stat paths that should be owned by nginx
  ansible.builtin.stat:
    path: '{{ item.path }}'
  loop:
    - { path: /run/php, recurse: false }
    - { path: '{{ nginx_php_fpm_socket }}', recurse: false }
    - { path: /var/www/html, recurse: true }
    - { path: /etc/nginx/, recurse: true }
    - { path: /var/log/nginx/, recurse: true }
  loop_control:
    label: '{{ item.path }}'
  register: nginx_owned_paths

- name: Set nginx ownership where the path exists
  ansible.builtin.file:
    path: '{{ item.item.path }}'
    owner: nginx
    group: nginx
    recurse: '{{ item.item.recurse }}'
  loop: '{{ nginx_owned_paths.results }}'
  loop_control:
    label: '{{ item.item.path }}'
  when: item.stat.exists
