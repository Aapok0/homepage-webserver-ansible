---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    update_cache: true

- name: Disable UFW ipv6
  ansible.builtin.lineinfile:
    dest: /etc/default/ufw
    regexp: '^IPV6='
    line: IPV6=no
  when: firewall_disable_ipv6
  notify: Reload UFW

- name: Enable UFW ipv6
  ansible.builtin.lineinfile:
    dest: /etc/default/ufw
    regexp: '^IPV6='
    line: IPV6=yes
  when: not firewall_disable_ipv6
  notify: Reload UFW

- name: Allow SSH only over the Tailscale interface
  community.general.ufw:
    rule: allow
    direction: in
    interface: '{{ firewall_ssh_interface }}'
    to_port: '22'
    proto: tcp
  when: firewall_ssh_over_tailscale_only
  notify: Reload UFW

- name: Allow SSH from specified addresses (fallback when not Tailscale-only)
  community.general.ufw:
    rule: allow
    to_port: '22'
    from_ip: '{{ item }}'
  loop: '{{ firewall_allowed_ips }}'
  when: not firewall_ssh_over_tailscale_only
  notify: Reload UFW

- name: Open ports
  community.general.ufw:
    rule: allow
    to_port: '{{ item.port }}'
    proto: '{{ item.proto }}'
  with_items: '{{ firewall_ufw_rules }}'
  notify: Reload UFW

- name: Enable UFW and deny incoming as policy
  community.general.ufw:
    state: enabled
    default: deny
    direction: incoming
