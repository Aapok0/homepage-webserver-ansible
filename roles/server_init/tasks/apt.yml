---
- name: Update apt repository and cache
  ansible.builtin.apt:
    update_cache: true
  become: true

- name: Upgrade apt packages
  ansible.builtin.apt:
    upgrade: true
  become: true

- name: Combine variable list and static list
  ansible.builtin.set_fact:
    server_init_combined_packages: '{{ server_init_default_packages + server_init_extra_packages }}'

- name: Make sure needed packages are installed
  ansible.builtin.apt:
    name: '{{ item }}'
  with_items: '{{ server_init_combined_packages }}'
  become: true

- name: Enable unattended upgrades
  ansible.builtin.debconf:
    name: unattended-upgrades
    question: unattended-upgrades/enable_auto_updates
    vtype: boolean
    value: 'true'
  register: server_init_unattended_enabled
  when: server_init_auto_upgrades

- name: Disable unattended upgrades
  ansible.builtin.debconf:
    name: unattended-upgrades
    question: unattended-upgrades/enable_auto_updates
    vtype: boolean
    value: 'false'
  register: server_init_unattended_disabled
  when: not server_init_auto_upgrades

- name: Reconfigure unattended-upgrades
  ansible.builtin.command:
    cmd: dpkg-reconfigure -f noninteractive unattended-upgrades
  changed_when: true
  when: server_init_unattended_enabled.changed or server_init_unattended_disabled.changed

- name: Check, if a reboot is needed
  ansible.builtin.stat:
    path: /var/run/reboot-required
    get_checksum: false
  register: server_init_reboot_required
  changed_when: server_init_reboot_required.stat.exists
  notify: Reboot host and wait for restart
